<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anthony Leong | Photography</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg: #090909;
            --bg-elevated: #0f0f0f;
            --fg: #e8e8e3;
            --muted: #5a5a5a;
            --accent: #b8956e;
            --card: #131313;
            --border: #222222;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        html { scroll-behavior: smooth; }
        
        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--fg);
            overflow-x: hidden;
            line-height: 1.6;
        }

        .font-display { font-family: 'Cormorant Garamond', serif; }

        /* View Transitions */
        .view-section {
            opacity: 0;
            visibility: hidden;
            position: absolute;
            top: 0; left: 0; right: 0;
            transition: opacity 0.6s ease, visibility 0.6s ease;
            pointer-events: none;
        }

        .view-section.active {
            opacity: 1;
            visibility: visible;
            position: relative;
            pointer-events: auto;
        }

        /* Hero Styles */
        .hero-container {
            position: relative;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .depth-title {
            font-size: clamp(3.5rem, 12vw, 11rem);
            font-weight: 300;
            letter-spacing: -0.03em;
            line-height: 0.9;
            text-align: center;
            color: var(--fg);
            position: relative;
            z-index: 1;
            user-select: none;
        }
        .depth-title span { display: block; position: relative; }
        .depth-title span::before {
            content: attr(data-text);
            position: absolute; left: 0; top: 0;
            color: transparent;
            -webkit-text-stroke: 0.5px rgba(255,255,255,0.05);
            z-index: -1;
        }

        /* Floating Cards */
        .floating-layer {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 10;
        }
        .float-card {
            position: absolute;
            border-radius: 6px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.8);
            transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            pointer-events: auto;
            cursor: pointer;
            background: var(--card);
        }
        .float-card img { width: 100%; height: 100%; object-fit: cover; display: block; }

        /* Ambient & Noise */
        .ambient-glow {
            position: absolute;
            width: 600px; height: 600px;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.15;
            pointer-events: none;
        }
        .noise-overlay {
            position: fixed; inset: 0; z-index: 9999;
            pointer-events: none; opacity: 0.03;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
        }

        /* Navigation */
        .nav-container {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 50;
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            mix-blend-mode: difference;
        }
        
        .nav-links { display: flex; gap: 2rem; }
        .nav-link {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--fg);
            text-decoration: none;
            position: relative;
            padding-bottom: 4px;
            transition: opacity 0.3s;
        }
        .nav-link::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0;
            width: 0; height: 1px;
            background: currentColor;
            transition: width 0.3s ease;
        }
        .nav-link:hover::after, .nav-link.active::after { width: 100%; }
        .nav-link.active { color: var(--accent); }

        /* Page Titles */
        .page-header {
            padding: 8rem 2rem 2rem;
            text-align: center;
        }
        .page-title {
            font-size: clamp(2.5rem, 8vw, 6rem);
            font-weight: 300;
            margin-bottom: 1rem;
        }
        .page-subtitle {
            color: var(--muted);
            max-width: 500px;
            margin: 0 auto;
        }

        /* === LAYOUTS === */

        /* 1. Urban: Bento Grid */
        .urban-grid {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: 12px;
            padding: 0 1rem 4rem;
            max-width: 1600px;
            margin: 0 auto;
        }
        .urban-item {
            position: relative;
            overflow: hidden;
            border-radius: 4px;
            background: var(--card);
            cursor: pointer;
        }
        .urban-item img {
            width: 100%; height: 100%;
            object-fit: cover;
            transition: transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .urban-item:hover img { transform: scale(1.05); }

        /* 2. Portrait: Vertical Slider */
        .portrait-container {
            height: 100vh;
            overflow-y: auto;
            scroll-snap-type: y mandatory;
            scroll-behavior: smooth;
        }
        .portrait-slide {
            height: 100vh;
            scroll-snap-align: start;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .portrait-img-container {
            height: 70vh;
            max-width: 900px;
            width: 90%;
            position: relative;
            overflow: hidden;
            border-radius: 4px;
            box-shadow: 0 30px 60px -15px rgba(0,0,0,0.8);
        }
        .portrait-img-container img {
            width: 100%; height: 100%;
            object-fit: cover;
        }
        .portrait-meta {
            position: absolute;
            bottom: -3rem;
            left: 0;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.5s ease 0.3s;
        }
        .portrait-slide:hover .portrait-meta {
            opacity: 1;
            transform: translateY(0);
        }

        /* 3. Landscape: Horizontal Scroll */
        .landscape-wrapper {
            height: 100vh;
            width: 100%;
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            align-items: center;
            background: #050505;
        }
        .landscape-item {
            flex: 0 0 80vw;
            max-width: 1200px;
            height: 70vh;
            margin: 0 5vw;
            scroll-snap-align: center;
            position: relative;
            border-radius: 6px;
            overflow: hidden;
            transition: transform 0.5s ease;
        }
        .landscape-item img {
            width: 100%; height: 100%;
            object-fit: cover;
            transition: transform 1s ease;
        }
        .landscape-item:hover img { transform: scale(1.02); }

        /* 4. Experimental: Chaos Grid */
        .exp-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 4rem;
            padding: 4rem;
            padding-top: 10rem;
        }
        .exp-item {
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            cursor: pointer;
        }
        .exp-item:nth-child(odd) { transform: rotate(-2deg) translateY(20px); }
        .exp-item:nth-child(even) { transform: rotate(2deg); }
        .exp-item:nth-child(3n) { transform: rotate(-1deg) scale(1.05); }
        
        .exp-item:hover {
            z-index: 10;
            transform: rotate(0deg) scale(1.1) !important;
            box-shadow: 0 40px 70px -20px rgba(0,0,0,0.9);
        }
        .exp-item img { 
            width: 100%; 
            height: auto; 
            display: block; 
            border-radius: 4px;
            box-shadow: 0 20px 40px -10px rgba(0,0,0,0.6);
        }

        /* Back Button */
        .back-btn {
            position: fixed;
            top: 2rem; left: 2rem;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--fg);
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
            background: rgba(0,0,0,0.5);
            padding: 0.75rem 1.25rem;
            border-radius: 50px;
            backdrop-filter: blur(10px);
        }
        .back-btn.visible { opacity: 1; visibility: visible; }
        .back-btn:hover { background: var(--fg); color: var(--bg); }

        /* Scroll Indicator */
        .scroll-indicator {
            position: absolute;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
            color: var(--muted);
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
        }
        .scroll-line {
            width: 1px;
            height: 40px;
            background: linear-gradient(to bottom, var(--muted), transparent);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .nav-links { gap: 1rem; }
            .urban-grid { grid-template-columns: repeat(2, 1fr); gap: 4px; padding: 0 0.5rem 2rem; }
            .landscape-item { flex: 0 0 90vw; height: 50vh; margin: 0 5vw; }
            .exp-grid { padding: 2rem; gap: 2rem; }
        }
    </style>
</head>
<body>

    <div class="noise-overlay"></div>

    <!-- Navigation -->
    <nav class="nav-container">
        <a href="#" onclick="navigateTo('home')" class="font-display text-xl tracking-wide" style="font-weight: 400; text-decoration: none; color: var(--fg);">Portfolio</a>
        <div class="nav-links">
            <a href="#" onclick="navigateTo('urban')" class="nav-link" data-view="urban">Urban</a>
            <a href="#" onclick="navigateTo('portrait')" class="nav-link" data-view="portrait">Portrait</a>
            <a href="#" onclick="navigateTo('landscape')" class="nav-link" data-view="landscape">Landscape</a>
            <a href="#" onclick="navigateTo('experimental')" class="nav-link" data-view="experimental">Exp</a>
        </div>
    </nav>

    <!-- Back Button (visible on internal pages) -->
    <button class="back-btn" id="backBtn" onclick="navigateTo('home')">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
        Back Home
    </button>

    <!-- HOME VIEW -->
    <section id="view-home" class="view-section active">
        <div class="hero-container">
            <div class="ambient-glow" style="background: #2a3a4a; top: 10%; left: 5%;"></div>
            <div class="ambient-glow" style="background: #4a3a2a; bottom: 10%; right: 5%;"></div>

            <h1 class="depth-title font-display">
                <span data-text="ANTHONY">ANTHONY</span>
                <span data-text="LEONG" style="font-style: italic; margin-top: 0.1em;">LEONG</span>
            </h1>

            <div class="floating-layer" id="floatingLayer"></div>

            <div class="scroll-indicator">
                <span>Scroll</span>
                <div class="scroll-line"></div>
            </div>
        </div>

        <!-- Home Gallery Preview (Optional, keeping it simple to focus on Categories) -->
        <div class="py-24 px-6 text-center">
            <p class="text-xs uppercase tracking-[0.3em] text-[var(--accent)] mb-4">Categories</p>
            <div class="flex flex-wrap justify-center gap-8 mt-8">
                <div onclick="navigateTo('urban')" class="cursor-pointer group">
                    <h3 class="font-display text-4xl group-hover:text-[var(--accent)] transition-colors">Urban</h3>
                    <p class="text-[var(--muted)] text-sm mt-2">Architecture & Streets</p>
                </div>
                <div onclick="navigateTo('portrait')" class="cursor-pointer group">
                    <h3 class="font-display text-4xl group-hover:text-[var(--accent)] transition-colors">Portrait</h3>
                    <p class="text-[var(--muted)] text-sm mt-2">People & Pets</p>
                </div>
                <div onclick="navigateTo('landscape')" class="cursor-pointer group">
                    <h3 class="font-display text-4xl group-hover:text-[var(--accent)] transition-colors">Landscape</h3>
                    <p class="text-[var(--muted)] text-sm mt-2">Nature & Places</p>
                </div>
            </div>
        </div>
    </section>

    <!-- URBAN VIEW (Bento Grid) -->
    <section id="view-urban" class="view-section">
        <div class="page-header">
            <p class="text-xs uppercase tracking-[0.3em] text-[var(--accent)] mb-2">Category</p>
            <h1 class="font-display page-title">Urban</h1>
            <p class="page-subtitle">Architecture and the organized chaos of city life.</p>
        </div>
        <div class="urban-grid" id="urbanGrid"></div>
    </section>

    <!-- PORTRAIT VIEW (Vertical Slider) -->
    <section id="view-portrait" class="view-section">
        <div class="portrait-container" id="portraitContainer"></div>
    </section>

    <!-- LANDSCAPE VIEW (Horizontal Scroll) -->
    <section id="view-landscape" class="view-section">
        <div class="page-header" style="position: absolute; width: 100%; z-index: 10; pointer-events: none;">
            <p class="text-xs uppercase tracking-[0.3em] text-[var(--accent)] mb-2">Category</p>
            <h1 class="font-display page-title">Landscape</h1>
        </div>
        <div class="landscape-wrapper" id="landscapeWrapper"></div>
    </section>

    <!-- EXPERIMENTAL VIEW (Chaos) -->
    <section id="view-experimental" class="view-section">
        <div class="exp-grid" id="expGrid"></div>
    </section>

    <!-- Minimal Footer -->
    <footer class="fixed bottom-0 left-0 right-0 p-6 text-center text-xs text-[var(--muted)] pointer-events-none z-40">
        2026 Anthony Leong
    </footer>

    <script>
        // === DATA ===
        const siteData = {
            floating: [
                { src: 'https://live.staticflickr.com/65535/55157116684_c8b5ac330d_b.jpg', x: '8%', y: '15%', w: 140, h: 200, rotate: -8, depth: 3 },
                { src: 'https://live.staticflickr.com/65535/55156914563_5a788bdd52_b.jpg', x: '72%', y: '20%', w: 110, h: 110, rotate: 10, depth: 2 },
                { src: 'https://live.staticflickr.com/65535/55157135330_cda3526096_b.jpg', x: '18%', y: '58%', w: 100, h: 130, rotate: 5, depth: 2.5 },
                { src: 'https://live.staticflickr.com/65535/55155867012_8cc0bf1607_b.jpg', x: '62%', y: '65%', w: 120, h: 80, rotate: -4, depth: 1.5 },
                { src: 'https://live.staticflickr.com/65535/55156995094_fd711e2aa3_b.jpg', x: '42%', y: '30%', w: 90, h: 120, rotate: 12, depth: 2 },
                { src: 'https://live.staticflickr.com/65535/55156758501_a6b7f87721_b.jpg', x: '80%', y: '75%', w: 80, h: 100, rotate: -6, depth: 1 },
            ],
            urban: [
                { src: 'https://live.staticflickr.com/65535/55157003279_d8b9ce545e_b.jpg', title: 'Shenzhen North', size: 'large' },
                { src: 'https://live.staticflickr.com/65535/55157003329_107449d282_b.jpg', title: 'Downtown Chongqing', size: 'medium' },
                { src: 'https://live.staticflickr.com/65535/55156922828_c9809cac24_b.jpg', title: 'Mall Architecture', size: 'medium' },
                { src: 'https://live.staticflickr.com/65535/55157312266_d31d4b0f24_b.jpg', title: 'Tech Hub', size: 'small' },
                { src: 'https://live.staticflickr.com/65535/55155852537_6ff76a7cea_b.jpg', title: 'Symmetry', size: 'small' },
                { src: 'https://live.staticflickr.com/65535/55157116684_c8b5ac330d_b.jpg', title: 'Vertical City', size: 'wide' },
            ],
            portrait: [
                { src: 'https://live.staticflickr.com/65535/55155852537_6ff76a7cea_b.jpg', title: 'Feline Grace', sub: 'Studio Work' },
                { src: 'https://live.staticflickr.com/65535/55157116684_c8b5ac330d_b.jpg', title: 'Contemplation', sub: 'Street Portrait' },
                { src: 'https://live.staticflickr.com/65535/55156995094_fd711e2aa3_b.jpg', title: 'Shadows', sub: 'Natural Light' },
            ],
            landscape: [
                { src: 'https://live.staticflickr.com/65535/55157552599_60ff8894e6_b.jpg', title: 'The Path' },
                { src: 'https://live.staticflickr.com/65535/55157135330_cda3526096_b.jpg', title: 'Horizons' },
                { src: 'https://live.staticflickr.com/65535/55155867012_8cc0bf1607_b.jpg', title: 'Serenity' },
            ],
            experimental: [
                { src: 'https://live.staticflickr.com/65535/55156914563_5a788bdd52_b.jpg', title: 'Abstract Form' },
                { src: 'https://live.staticflickr.com/65535/55156758501_a6b7f87721_b.jpg', title: 'Double Exposure' },
                { src: 'https://live.staticflickr.com/65535/55156922828_c9809cac24_b.jpg', title: 'Glitch' },
                { src: 'https://live.staticflickr.com/65535/55157312266_d31d4b0f24_b.jpg', title: 'Mosaic' },
            ]
        };

        // === ROUTER ===
        const views = document.querySelectorAll('.view-section');
        const navLinks = document.querySelectorAll('.nav-link');
        const backBtn = document.getElementById('backBtn');

        function navigateTo(viewName) {
            // Hide all views
            views.forEach(v => v.classList.remove('active'));
            navLinks.forEach(l => l.classList.remove('active'));

            // Show target view
            const targetView = document.getElementById(`view-${viewName}`);
            if(targetView) {
                targetView.classList.add('active');
                
                // Handle Nav state
                const correspondingLink = document.querySelector(`.nav-link[data-view="${viewName}"]`);
                if(correspondingLink) correspondingLink.classList.add('active');
                
                // Show back button if not home
                if(viewName !== 'home') {
                    backBtn.classList.add('visible');
                    document.body.style.overflow = 'auto'; // Reset scroll behavior
                } else {
                    backBtn.classList.remove('visible');
                }
                
                // Special scroll resets
                if(viewName === 'portrait') {
                    document.getElementById('portraitContainer').scrollTop = 0;
                } 
                if(viewName === 'landscape') {
                    document.getElementById('landscapeWrapper').scrollLeft = 0;
                }
            }
            
            // Prevent default anchor jump
            return false;
        }

        // === GENERATION FUNCTIONS ===

        // 1. Home Floating Layer
        function initHome() {
            const layer = document.getElementById('floatingLayer');
            layer.innerHTML = '';
            let mouseX = 0, mouseY = 0;
            let targetX = 0, targetY = 0;

            siteData.floating.forEach((p, i) => {
                const card = document.createElement('div');
                card.className = 'float-card';
                card.style.cssText = `left: ${p.x}; top: ${p.y}; width: ${p.w}px; height: ${p.h}px; transform: rotate(${p.rotate}deg);`;
                card.innerHTML = `<img src="${p.src}" alt="Float ${i}">`;
                card.dataset.depth = p.depth;
                card.dataset.rotate = p.rotate;
                layer.appendChild(card);
            });

            document.addEventListener('mousemove', (e) => {
                mouseX = (e.clientX / window.innerWidth - 0.5) * 40;
                mouseY = (e.clientY / window.innerHeight - 0.5) * 40;
            });

            function animate() {
                targetX += (mouseX - targetX) * 0.08;
                targetY += (mouseY - targetY) * 0.08;
                document.querySelectorAll('.float-card').forEach(c => {
                    const d = parseFloat(c.dataset.depth);
                    const r = parseFloat(c.dataset.rotate);
                    c.style.transform = `rotate(${r}deg) translate(${targetX * d}px, ${targetY * d}px)`;
                });
                requestAnimationFrame(animate);
            }
            animate();
        }

        // 2. Urban Grid (Bento)
        function initUrban() {
            const grid = document.getElementById('urbanGrid');
            grid.innerHTML = '';
            
            // Helper for grid placement (simplified bento logic)
            const sizes = {
                large: 'grid-column: span 6; grid-row: span 2; aspect-ratio: 2/1;',
                medium: 'grid-column: span 4; grid-row: span 2; aspect-ratio: 1/1.2;',
                small: 'grid-column: span 2; grid-row: span 1; aspect-ratio: 1/1;',
                wide: 'grid-column: span 8; grid-row: span 1; aspect-ratio: 3/1;'
            };

            siteData.urban.forEach(p => {
                const item = document.createElement('div');
                item.className = 'urban-item';
                item.style.cssText = sizes[p.size] || sizes.medium;
                item.innerHTML = `<img src="${p.src}" alt="${p.title}">`;
                grid.appendChild(item);
            });
        }

        // 3. Portrait Slider
        function initPortrait() {
            const container = document.getElementById('portraitContainer');
            container.innerHTML = '';
            
            siteData.portrait.forEach(p => {
                const slide = document.createElement('div');
                slide.className = 'portrait-slide';
                slide.innerHTML = `
                    <div class="portrait-img-container">
                        <img src="${p.src}" alt="${p.title}">
                    </div>
                    <div class="portrait-meta">
                        <h3 class="font-display text-3xl">${p.title}</h3>
                        <p class="text-xs text-[var(--muted)] uppercase tracking-widest">${p.sub}</p>
                    </div>
                `;
                container.appendChild(slide);
            });
        }

        // 4. Landscape Scroll
        function initLandscape() {
            const wrapper = document.getElementById('landscapeWrapper');
            wrapper.innerHTML = '';
            
            siteData.landscape.forEach(p => {
                const item = document.createElement('div');
                item.className = 'landscape-item';
                item.innerHTML = `
                    <img src="${p.src}" alt="${p.title}">
                    <div class="absolute bottom-8 left-8 font-display text-4xl mix-blend-difference text-white">${p.title}</div>
                `;
                wrapper.appendChild(item);
            });
        }

        // 5. Experimental
        function initExperimental() {
            const grid = document.getElementById('expGrid');
            grid.innerHTML = '';
            
            siteData.experimental.forEach(p => {
                const item = document.createElement('div');
                item.className = 'exp-item';
                item.innerHTML = `<img src="${p.src}" alt="${p.title}">`;
                grid.appendChild(item);
            });
        }

        // Initialize All
        document.addEventListener('DOMContentLoaded', () => {
            initHome();
            initUrban();
            initPortrait();
            initLandscape();
            initExperimental();
        });
    </script>
</body>
</html>
