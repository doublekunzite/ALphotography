<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Anthony Leong</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📷</text></svg>" type="image/svg+xml">

    <!-- ADDED: Specific Styles for Contact Page Layout -->
    <style>
        body {
            background-color: #000; /* Fallback */
            background: var(--bg);
            color: var(--fg);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            margin: 0;
        }

        /* Main Container Layout */
        .contact-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 2rem;
            z-index: 10;
        }

        /* Typography */
        .contact-title {
            font-size: clamp(2.5rem, 8vw, 5rem); /* Large responsive text */
            margin-bottom: 1.5rem;
            letter-spacing: -0.02em;
        }

        .contact-description {
            font-size: 1rem;
            color: var(--muted);
            max-width: 500px;
            line-height: 1.6;
            margin-bottom: 2rem;
        }

        /* Buttons Container */
        .button-group {
            display: flex;
            flex-wrap: wrap;
            gap: 1.5rem;
            justify-content: center;
        }

        /* Button Styles */
        .contact-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.8rem 1.5rem;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.9rem;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .contact-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        /* LinkedIn Specific */
        .btn-linkedin {
            background-color: #0077B5;
            color: white;
        }
        .btn-linkedin:hover {
            background-color: #006097;
        }

        /* GitHub Specific */
        .btn-github {
            background-color: #333;
            color: white;
        }
        .btn-github:hover {
            background-color: #444;
        }
    </style>
</head>
<body>
    <div class="noise-overlay"></div>

    <!-- Navigation -->
    <nav class="nav-container">
        <a href="index.html" class="font-display text-xl tracking-wide" style="font-weight: 400; text-decoration: none; color: var(--fg);">Portfolio</a>
        <div class="nav-links">
            
            <!-- Photos Dropdown -->
            <div class="dropdown">
                <button class="dropbtn">Photos</button>
                <div class="dropdown-content">
                    <a href="urban.html">Urban</a>
                    <a href="nature.html">Nature</a>
                    <a href="landscape.html">Landscape</a>
                    <a href="geometric.html">Geometric</a>
                </div>
            </div>

            <!-- Standard Links -->
            <a href="process.html" class="nav-link">Process</a>
            <a href="design.html" class="nav-link">Design</a>
            <a href="contact.html" class="nav-link">Contact</a>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="contact-container">
        <h1 class="contact-title font-display">Get in Touch</h1>
        <p class="contact-description">
            Want to get in touch? Feel free to connect via email or LinkedIn.
        </p>

        <!-- Email Block -->
        <p class="contact-email" style="color: var(--fg); font-weight: 500; margin-bottom: 2.5rem; font-size: 1.1rem;">
            alewisleong@gmail.com
        </p>

        <div class="button-group">
            <!-- LinkedIn Button -->
            <a href="https://www.linkedin.com/in/anthony-l-b54748141/" target="_blank" class="contact-btn btn-linkedin">
                <!-- SVG Icon -->
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.79-1.75-1.764s.784-1.764 1.75-1.764 1.75.79 1.75 1.764-.783 1.764-1.75 1.764zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z"/>
                </svg>
                Connect on LinkedIn
            </a>

            <!-- GitHub Button -->
            <a href="https://github.com/doublekunzite/ALphotography" target="_blank" class="contact-btn btn-github">
                <!-- SVG Icon -->
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
                </svg>
                Source Code on GitHub
            </a>
        </div>
    </div>

    <!-- Dropdown Script -->
    <script>
        // Simple script for mobile dropdown toggle
        document.addEventListener('DOMContentLoaded', function() {
            const dropdowns = document.querySelectorAll('.dropdown');
            dropdowns.forEach(dropdown => {
                const button = dropdown.querySelector('.dropbtn');
                button.addEventListener('click', function(e) {
                    if (window.matchMedia("(hover: none)").matches) {
                        e.preventDefault();
                        dropdown.classList.toggle('active');
                    }
                });
            });
        });
    </script>
</body>
</html>
