<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Anthony Leong</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📷</text></svg>" type="image/svg+xml">

    <!-- SVG Icons for Buttons -->
    <style>
        /* Basic Reset & Layout */
        body {
            background-color: #000; /* Fallback */
            background: var(--bg);
            color: var(--fg);
            font-family: sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* Reusing the noise overlay from your main site */
        .noise-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1000;
            opacity: 0.03;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        /* Main Container */
        .contact-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 2rem;
            z-index: 10;
        }

        /* Typography */
        .contact-title {
            font-size: clamp(2.5rem, 8vw, 5rem); /* Large responsive text */
            font-weight: 300;
            margin-bottom: 1.5rem;
            letter-spacing: -0.02em;
        }

        .contact-description {
            font-size: 1rem;
            color: var(--muted);
            max-width: 500px;
            line-height: 1.6;
            margin-bottom: 3rem;
        }

        /* Buttons Container */
        .button-group {
            display: flex;
            flex-wrap: wrap;
            gap: 1.5rem;
            justify-content: center;
        }

        /* Button Styles */
        .contact-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.8rem 1.5rem;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.9rem;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .contact-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        /* LinkedIn Specific */
        .btn-linkedin {
            background-color: #0077B5;
            color: white;
        }
        .btn-linkedin:hover {
            background-color: #006097;
        }

        /* GitHub Specific */
        .btn-github {
            background-color: #333; /* Dark gray from screenshot */
            color: white;
        }
        .btn-github:hover {
            background-color: #444;
        }

    </style>
</head>
<body>
    <div class="noise-overlay"></div>

    <!-- Navigation (Consistent with other pages) -->
    <nav class="nav-container">
        <a href="index.html" class="font-display text-xl tracking-wide" style="font-weight: 400; text-decoration: none; color: var(--fg);">Portfolio</a>
        <div class="nav-links">
            <!-- Photos Dropdown -->
            <div class="dropdown">
                <button class="dropbtn">Photos</button>
                <div class="dropdown-content">
                    <a href="urban.html">Urban</a>
                    <a href="nature.html">Nature</a>
                    <a href="landscape.html">Landscape</a>
                    <a href="geometric.html">Geometric</a>
                </div>
            </div>
            <a href="process.html" class="nav-link">Process</a>
            <a href="design.html" class="nav-link">Design</a>
            <a href="contact.html" class="nav-link">Contact</a>
        </div>
    </nav>

    <!-- Main Content -->
        <!-- Main Content -->
    <div class="contact-container">
        <h1 class="contact-title font-display">Get in Touch</h1>
        <p class="contact-description">
            Have questions about the project or want to discuss opportunities? Feel free to connect via LinkedIn or check out the source code.
        </p>

        <!-- ADD THIS BLOCK -->
        <p class="contact-email" style="color: var(--fg); font-weight: 500; margin-bottom: 2.5rem; font-size: 1.1rem;">
            alewisleong@gmail.com
        </p>

        <div class="button-group">
            <!-- LinkedIn Button -->
            <a href="https://www.linkedin.com/in/anthony-l-b54748141/" target="_blank" class="contact-btn btn-linkedin">
                <!-- SVG Icon code... -->
                Connect on LinkedIn
            </a>

            <!-- GitHub Button -->
            <a href="https://github.com/doublekunzite/ALphotography" target="_blank" class="contact-btn btn-github">
                <!-- SVG Icon code... -->
                Source Code on GitHub
            </a>
        </div>
    </div>

    <!-- Dropdown Script (Needed for the nav to work) -->
    <script>
        // Simple script to ensure dropdown works if JS is enabled,

    </script>
</body>
